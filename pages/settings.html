<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Settings — StockWise</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<script src="../js/auth-guard.js"></script>
<script src="../js/icons.js"></script>
<script src="../js/sidebar.js"></script>

<div class="main">
  <div class="topbar">
    <div class="topbar-title">Settings <span class="topbar-sub">/ My Account</span></div>
    <div class="topbar-actions">
      <button class="icon-btn" id="notifBellBtn">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span id="notifDot" style="display:none;position:absolute;top:6px;right:6px;width:7px;height:7px;background:var(--danger);border-radius:50%"></span>
      </button>
    </div>
  </div>

  <div class="page-content">
    <div class="page-header">
      <div class="page-header-left">
        <h2>Settings</h2>
        <p>View your profile and manage your account</p>
      </div>
    </div>

    <div class="grid-2">

      <!-- PROFILE CARD -->
      <div class="card">
        <div class="card-header">
          <div class="card-header-left">
            <div class="card-title">My Profile</div>
            <div class="card-sub">Your account information</div>
          </div>
        </div>
        <div class="card-body">
          <!-- Avatar -->
          <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border)">
            <div style="width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#1a56db,#16bdca);display:flex;align-items:center;justify-content:center;flex-shrink:0">
              <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </div>
            <div>
              <div id="profileFullName" style="font-size:1rem;font-weight:700;color:var(--text)">—</div>
              <div id="profileUsername" style="font-size:.82rem;color:var(--text-muted);margin-top:2px">—</div>
            </div>
          </div>

          <!-- Info rows -->
          <div style="display:flex;flex-direction:column;gap:14px">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span style="font-size:.8rem;color:var(--text-muted);font-weight:500">Full Name</span>
              <span id="infoFullName" style="font-size:.85rem;font-weight:600">—</span>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span style="font-size:.8rem;color:var(--text-muted);font-weight:500">Username</span>
              <span id="infoUsername" style="font-size:.85rem;font-weight:600">—</span>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span style="font-size:.8rem;color:var(--text-muted);font-weight:500">Email</span>
              <span id="infoEmail" style="font-size:.85rem;font-weight:600">—</span>
            </div>
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span style="font-size:.8rem;color:var(--text-muted);font-weight:500">Role</span>
              <span id="infoRole" class="badge">—</span>
            </div>
          </div>
        </div>
      </div>

      <!-- CHANGE PASSWORD CARD -->
      <div class="card">
        <div class="card-header">
          <div class="card-header-left">
            <div class="card-title">Change Password</div>
            <div class="card-sub">Update your account password</div>
          </div>
        </div>
        <div class="card-body">
          <div class="form-group">
            <label class="form-label">Current Password <span class="req">*</span></label>
            <input class="form-control" id="cp-current" type="password" placeholder="Enter current password"/>
          </div>
          <div class="form-group">
            <label class="form-label">New Password <span class="req">*</span></label>
            <input class="form-control" id="cp-new" type="password" placeholder="Minimum 8 characters"/>
          </div>
          <div class="form-group">
            <label class="form-label">Confirm New Password <span class="req">*</span></label>
            <input class="form-control" id="cp-confirm" type="password" placeholder="Repeat new password"/>
          </div>
          <button class="btn btn-primary" onclick="changePassword()">Update Password</button>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="../js/utils.js"></script>
<script>
async function loadProfile() {
    const res = await apiGet('session.php');
    if (!res) return;

    const roleLabel = { admin: 'Administrator', stock_manager: 'Stock Manager', cashier: 'Cashier' };
    const roleClass = { admin: 'badge-info', stock_manager: 'badge-warning', cashier: 'badge-gray' };

    document.getElementById('profileFullName').textContent = res.full_name || res.username;
    document.getElementById('profileUsername').textContent  = '@' + res.username;
    document.getElementById('infoFullName').textContent     = res.full_name || '—';
    document.getElementById('infoUsername').textContent     = res.username;
    document.getElementById('infoEmail').textContent        = res.email || '—';

    const roleEl = document.getElementById('infoRole');
    roleEl.textContent  = roleLabel[res.role] || res.role;
    roleEl.className    = 'badge ' + (roleClass[res.role] || 'badge-gray');
}

async function changePassword() {
    const current = document.getElementById('cp-current').value;
    const newpass  = document.getElementById('cp-new').value;
    const confirm  = document.getElementById('cp-confirm').value;

    if (!current || !newpass || !confirm) { showToast('Please fill in all fields.', 'error'); return; }
    if (newpass.length < 8)               { showToast('New password must be at least 8 characters.', 'error'); return; }
    if (newpass !== confirm)              { showToast('New passwords do not match.', 'error'); return; }

    const res = await apiPut('users.php', { current_password: current, new_password: newpass });
    if (res && res.success) {
        showToast('Password updated successfully.');
        document.getElementById('cp-current').value = '';
        document.getElementById('cp-new').value     = '';
        document.getElementById('cp-confirm').value = '';
    } else {
        showToast(res?.message || 'Failed to update password.', 'error');
    }
}

loadProfile();
</script>
</body>
</html>
