<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Suppliers — StockWise</title>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body>
<script src="../js/auth-guard.js"></script>
<script src="../js/icons.js"></script>
<script src="../js/sidebar.js"></script>

<div class="main">
  <div class="topbar">
    <div class="topbar-title">Suppliers <span class="topbar-sub">/ Directory</span></div>
    <div class="search-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity:.4;flex-shrink:0"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="supSearch" placeholder="Search suppliers..." oninput="filterTable('supSearch','supTbody')"/>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg><span class="notif-dot"></span></button>
      <button class="btn btn-primary btn-sm" onclick="openModal('modalAddSupplier')">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Supplier
      </button>
    </div>
  </div>

  <div class="page-content">
    <div class="page-header">
      <div class="page-header-left">
        <h2>Suppliers</h2>
        <p>Manage your supplier directory. Data loaded from database.</p>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-header-left">
          <div class="card-title">Supplier Directory</div>
          <div class="card-sub" id="supCount">Loading...</div>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>#</th><th>Supplier Name</th><th>Contact Number</th><th>Email Address</th><th>Address</th><th>Products</th><th>Actions</th></tr>
          </thead>
          <tbody id="supTbody">
            <tr><td colspan="7" style="text-align:center;padding:32px;color:var(--text-muted)">Loading suppliers from database...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- ADD SUPPLIER MODAL -->
<div class="modal-overlay" id="modalAddSupplier">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Add Supplier</div>
      <button class="modal-close" onclick="closeModal('modalAddSupplier')"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Supplier Name <span class="req">*</span></label><input class="form-control" id="as-name" required placeholder="Company name"/></div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Contact Number</label><input class="form-control" id="as-contact" placeholder="02-XXXX-XXXX"/></div>
        <div class="form-group"><label class="form-label">Email Address</label><input class="form-control" id="as-email" type="email" placeholder="supply@company.ph"/></div>
      </div>
      <div class="form-group"><label class="form-label">Address</label><input class="form-control" id="as-address" placeholder="City, Province"/></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalAddSupplier')">Cancel</button>
      <button class="btn btn-primary" onclick="submitAddSupplier()">Save Supplier</button>
    </div>
  </div>
</div>

<!-- EDIT SUPPLIER MODAL -->
<div class="modal-overlay" id="modalEditSupplier">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Edit Supplier</div>
      <button class="modal-close" onclick="closeModal('modalEditSupplier')"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="es-id"/>
      <div class="form-group"><label class="form-label">Supplier Name</label><input class="form-control" id="es-name"/></div>
      <div class="form-grid">
        <div class="form-group"><label class="form-label">Contact Number</label><input class="form-control" id="es-contact"/></div>
        <div class="form-group"><label class="form-label">Email Address</label><input class="form-control" id="es-email"/></div>
      </div>
      <div class="form-group"><label class="form-label">Address</label><input class="form-control" id="es-address"/></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalEditSupplier')">Cancel</button>
      <button class="btn btn-primary" onclick="submitEditSupplier()">Save Changes</button>
    </div>
  </div>
</div>

<script src="../js/utils.js"></script>
<script>
let _allSuppliers = [];
let _deleteSupId  = null;

async function loadSuppliers() {
    const res = await apiGet('suppliers.php');
    if (!res) return;
    _allSuppliers = res.data;
    document.getElementById('supCount').textContent = _allSuppliers.length + ' registered suppliers';
    renderTable(_allSuppliers);
}

function renderTable(suppliers) {
    const tbody = document.getElementById('supTbody');
    if (!suppliers.length) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--text-muted)">No suppliers found.</td></tr>`;
        return;
    }
    tbody.innerHTML = suppliers.map((s, i) => `
        <tr>
          <td>${i + 1}</td>
          <td><div class="td-bold">${s.name}</div></td>
          <td>${s.contact || '—'}</td>
          <td>${s.email || '—'}</td>
          <td>${s.address || '—'}</td>
          <td><span class="badge badge-info">${s.product_count} products</span></td>
          <td>
            <button class="btn btn-outline btn-sm" onclick="openEdit(${s.supplier_id})">Edit</button>
            <button class="btn-danger-sm" onclick="deleteSupplier(${s.supplier_id}, '${s.name}')">Delete</button>
          </td>
        </tr>`).join('');
}

async function submitAddSupplier() {
    const body = {
        name:    document.getElementById('as-name').value,
        contact: document.getElementById('as-contact').value,
        email:   document.getElementById('as-email').value,
        address: document.getElementById('as-address').value,
    };
    if (!body.name.trim()) { showToast('Supplier name is required.', 'error'); return; }
    const res = await apiPost('suppliers.php', body);
    if (res.success) {
        showToast('Supplier added.');
        closeModal('modalAddSupplier');
        ['as-name','as-contact','as-email','as-address'].forEach(id => document.getElementById(id).value = '');
        loadSuppliers();
    } else {
        showToast(res.message, 'error');
    }
}

function openEdit(id) {
    const s = _allSuppliers.find(s => s.supplier_id == id);
    if (!s) return;
    document.getElementById('es-id').value      = s.supplier_id;
    document.getElementById('es-name').value    = s.name;
    document.getElementById('es-contact').value = s.contact || '';
    document.getElementById('es-email').value   = s.email || '';
    document.getElementById('es-address').value = s.address || '';
    openModal('modalEditSupplier');
}

async function submitEditSupplier() {
    const id   = document.getElementById('es-id').value;
    const body = {
        name:    document.getElementById('es-name').value,
        contact: document.getElementById('es-contact').value,
        email:   document.getElementById('es-email').value,
        address: document.getElementById('es-address').value,
    };
    const res = await apiPut(`suppliers.php?id=${id}`, body);
    if (res.success) {
        showToast('Supplier updated.');
        closeModal('modalEditSupplier');
        loadSuppliers();
    } else {
        showToast(res.message, 'error');
    }
}

async function deleteSupplier(id, name) {
    if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
    const res = await apiDelete(`suppliers.php?id=${id}`);
    if (res.success) {
        showToast('Supplier deleted.', 'warn');
        loadSuppliers();
    } else {
        showToast(res.message, 'error');
    }
}

loadSuppliers();
</script>
</body>
</html>
